[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "img2svg"
version = "0.1.0"
description = "Raster image → SVG / VQL vectorization"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "vql>=0.1.0",
    "pillow>=10.0.0",
]

[project.optional-dependencies]
opencv = ["opencv-python-headless>=4.8.0", "numpy>=1.24.0"]

[project.scripts]
img2svg = "img2svg.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
