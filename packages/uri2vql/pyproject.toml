[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2vql"
version = "0.1.0"
description = "vql:// URI — query and patch VQL programs"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "vql[desktop]>=0.1.0",
    "pillow>=10.0",
    "mss>=9.0",
]

[project.optional-dependencies]
# img2vql is a sibling package in the monorepo — install with:
#   pip install -e packages/img2vql
# (see install-dev.sh; do not use PyPI extras here — breaks editable monorepo layout)
diagnose = []
pipeline = []
imgl = ["imgl>=0.6.0"]

[project.scripts]
uri2vql = "uri2vql.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
