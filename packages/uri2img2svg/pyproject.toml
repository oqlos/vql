[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uri2img2svg"
version = "0.1.0"
description = "img2svg:// URI — raster image vectorization"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["img2svg>=0.1.0"]

[project.scripts]
uri2img2svg = "uri2img2svg.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
