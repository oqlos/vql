[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsl2vql"
version = "0.1.0"
description = "VQL control DSL — query, validate, render, generate and compile vector programs"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "vql>=0.1.0",
    "uri2vql>=0.1.0",
    "nlp2vql>=0.1.0",
    "protobuf>=5.0",
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
dsl2vql = "dsl2vql.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"dsl2vql" = ["schema/commands/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
