[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nlp2vql"
version = "0.1.0"
description = "NL → VQL control DSL"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["vql>=0.1.0"]

[project.scripts]
nlp2vql = "nlp2vql.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
