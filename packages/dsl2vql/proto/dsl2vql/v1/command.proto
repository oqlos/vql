syntax = "proto3";
package dsl2vql.v1;

message QueryCommand {
  string target = 1;
  string file = 2;
  string format = 3;
}

message ValidateCommand {
  string path = 1;
}

message ResolveCommand {
  string text = 1;
  string file = 2;
}

message PatchCommand {
  string target = 1;
  string with_path = 2;
  string file = 3;
}

message GenerateCommand {
  string text = 1;
  string out = 2;
}

message RenderCommand {
  string path = 1;
  string out = 2;
  string format = 3;
}

message CompileCommand {
  string text = 1;
  double width = 2;
  double height = 3;
}

message ExportCommand {
  string path = 1;
  string out = 2;
  string format = 3;
}

message DslEnvelope {
  string verb = 1;
  oneof body {
    QueryCommand query = 10;
    ValidateCommand validate = 11;
    ResolveCommand resolve = 12;
    PatchCommand patch = 13;
    GenerateCommand generate = 14;
    RenderCommand render = 15;
    CompileCommand compile = 16;
    ExportCommand export = 17;
  }
  string default_file = 20;
  string correlation_id = 21;
}
